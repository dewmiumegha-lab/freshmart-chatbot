<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kade Bot — Grocery Assistant</title>
<style>
  :root{
    --bg: #1f2318;
    --panel: #262b1d;
    --leaf: #7cb518;
    --leaf-dark: #5c8a10;
    --clay: #e8871e;
    --cream: #f5f1e6;
    --muted: #9aa383;
    --bubble-user: #3a4128;
    --bubble-bot: #34391f;
    font-family: "Segoe UI", system-ui, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 0%, rgba(124,181,24,0.15), transparent 45%),
      radial-gradient(circle at 100% 100%, rgba(232,135,30,0.12), transparent 40%),
      var(--bg);
    color:var(--cream);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .app{
    width:100%;
    max-width:520px;
    background:var(--panel);
    border-radius:18px;
    border:1px solid #3a4128;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    height:min(720px, 90vh);
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
  }
  .header{
    padding:18px 20px;
    background:linear-gradient(120deg, var(--leaf-dark), #46660c);
    display:flex;
    align-items:center;
    gap:12px;
    border-bottom:1px solid #3a4128;
  }
  .header .mark{
    width:38px;height:38px;border-radius:10px;
    background:var(--clay);
    display:flex;align-items:center;justify-content:center;
    font-size:20px;
  }
  .header h1{
    font-size:16px;
    margin:0;
    letter-spacing:0.3px;
  }
  .header p{
    margin:2px 0 0;
    font-size:12px;
    color:#dfe8c8;
    opacity:0.85;
  }
  .status-dot{
    width:8px;height:8px;border-radius:50%;
    background:#6ee06e;
    margin-left:auto;
    box-shadow:0 0 0 3px rgba(110,224,110,0.2);
  }
  .messages{
    flex:1;
    overflow-y:auto;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .row{display:flex;}
  .row.user{justify-content:flex-end;}
  .bubble{
    max-width:78%;
    padding:10px 14px;
    border-radius:14px;
    font-size:14.5px;
    line-height:1.45;
  }
  .row.bot .bubble{
    background:var(--bubble-bot);
    border-bottom-left-radius:4px;
    color:var(--cream);
  }
  .row.user .bubble{
    background:var(--leaf);
    color:#1c220e;
    font-weight:500;
    border-bottom-right-radius:4px;
  }
  .row.bot .bubble.error{
    background:#4a2320;
    color:#f3c9c4;
  }
  .tag{
    display:block;
    margin-top:6px;
    font-size:10px;
    letter-spacing:0.4px;
    text-transform:uppercase;
    color:var(--muted);
  }
  .typing{
    display:flex;
    gap:4px;
    padding:12px 14px;
  }
  .typing span{
    width:6px;height:6px;border-radius:50%;
    background:var(--muted);
    animation:blink 1.2s infinite;
  }
  .typing span:nth-child(2){animation-delay:0.2s;}
  .typing span:nth-child(3){animation-delay:0.4s;}
  @keyframes blink{
    0%,80%,100%{opacity:0.2;}
    40%{opacity:1;}
  }
  form{
    display:flex;
    gap:8px;
    padding:14px;
    border-top:1px solid #3a4128;
    background:#20260f;
  }
  input[type="text"]{
    flex:1;
    background:#1a1e11;
    border:1px solid #3a4128;
    color:var(--cream);
    padding:11px 14px;
    border-radius:10px;
    font-size:14px;
    outline:none;
  }
  input[type="text"]:focus{
    border-color:var(--leaf);
  }
  button{
    background:var(--clay);
    color:#1c220e;
    border:none;
    padding:0 18px;
    border-radius:10px;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    transition:transform 0.1s ease, background 0.15s ease;
  }
  button:hover{background:#f19b34;}
  button:active{transform:scale(0.96);}
  button:disabled{opacity:0.5;cursor:not-allowed;}
  .messages::-webkit-scrollbar{width:6px;}
  .messages::-webkit-scrollbar-thumb{background:#3a4128;border-radius:6px;}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="mark">🛒</div>
    <div>
      <h1>Fresh Mart</h1>
      <p>Your grocery store assistant</p>
    </div>
    <div class="status-dot" title="Connected"></div>
  </div>

  <div class="messages" id="messages">
    <div class="row bot">
      <div class="bubble">Welcome! Ask me about delivery, hours, prices, or anything else about the store.</div>
    </div>
  </div>

  <form id="chat-form">
    <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off" autofocus />
    <button type="submit" id="send-btn">Send</button>
  </form>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const form = document.getElementById('chat-form');
  const input = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  function addMessage(text, sender, tag) {
    const row = document.createElement('div');
    row.className = 'row ' + sender;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    if (tag) {
      const tagEl = document.createElement('span');
      tagEl.className = 'tag';
      tagEl.textContent = tag;
      bubble.appendChild(tagEl);
    }

    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'row bot';
    row.id = 'typing-row';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const row = document.getElementById('typing-row');
    if (row) row.remove();
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    input.value = '';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        addMessage(data.reply || 'Something went wrong.', 'bot');
      } else {
        addMessage(data.reply, 'bot', data.intent || 'unrecognized');
      }
    } catch (err) {
      removeTyping();
      addMessage('Could not reach the server. Is app.py still running?', 'bot');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });
</script>

</body>
</html>
